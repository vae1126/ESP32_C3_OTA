<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OTA 固件管理{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 60px; background: #f5f5f5; }
        .navbar-brand { font-weight: bold; }
        .card { margin-bottom: 1rem; }
        .version-badge { font-family: monospace; }
        pre.changelog { white-space: pre-wrap; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">🔧 OTA 固件管理</a>
        {% if session.logged_in %}
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">📦 固件版本</a>
            <a class="nav-link" href="/devices">📱 设备管理</a>
            <a class="nav-link text-warning" href="/logout">退出</a>
        </div>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
